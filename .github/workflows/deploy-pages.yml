name: Build protocol HTML site

on:
  push:
    branches:
      - main
    paths:
      - "outputs/**/*.html"
      - "outputs/**/*.csv"
      - "tools/build_pages_site.py"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build static Pages site
        run: python tools/build_pages_site.py

      - name: Copy generated site to repository root
        run: |
          cp -R site/. .

      - name: Commit generated Pages files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html latest.html reports/
          if git diff --cached --quiet; then
            echo "No generated Pages changes."
          else
            git commit -m "Publicar reportes HTML en GitHub Pages [skip ci]"
            git push
          fi
